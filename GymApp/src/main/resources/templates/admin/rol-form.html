<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Crear Rol - Icesi Fit')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>
<div class="container">
    <div class="row justify-content-center"><div class="col-md-7">
        <div class="card shadow-sm"><div class="card-body p-4">
            <h3 class="fw-bold mb-4"><i class="bi bi-shield-plus me-2"></i>Crear Nuevo Rol</h3>
            <form th:action="@{/admin/roles}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nombre del Rol</label>
                    <input type="text" name="nombre" class="form-control" placeholder="Ej: MODERADOR" required/>
                    <small class="text-muted">Se convertirá a mayúsculas automáticamente</small>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Descripción</label>
                    <input type="text" name="descripcion" class="form-control" placeholder="Descripción del rol (opcional)"/>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Permisos <span class="text-danger">*</span></label>
                    <p class="text-muted small mb-2">Selecciona al menos un permiso</p>
                    <div class="row">
                        <div th:each="permiso : ${permisos}" class="col-md-6 mb-2">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="permisosIds" th:value="${permiso.id}" th:id="'permiso-' + ${permiso.id}"/>
                                <label class="form-check-label" th:for="'permiso-' + ${permiso.id}">
                                    <strong th:text="${permiso.nombre}"></strong><br/>
                                    <small class="text-muted" th:text="${permiso.descripcion}"></small>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success"><i class="bi bi-check-lg me-1"></i>Crear Rol</button>
                    <a th:href="@{/admin/roles}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div></div>
    </div></div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
