<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Usuarios - Icesi Fit')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-people me-2"></i>Gestión de Usuarios</h2>
        <a th:href="@{/admin}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Dashboard</a>
    </div>
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead><tr><th>ID</th><th>Nombre</th><th>Correo</th><th>Rol</th><th>Estado</th><th class="text-center">Acciones</th></tr></thead>
                    <tbody>
                        <tr th:each="usuario : ${usuarios}">
                            <td th:text="${usuario.id}"></td>
                            <td><i class="bi bi-person-circle me-1 text-muted"></i><span th:text="${usuario.nombre}"></span></td>
                            <td th:text="${usuario.correoInstitucional}"></td>
                            <td><span class="badge" th:classappend="${usuario.rol.nombre == 'ADMIN'} ? 'bg-danger' : (${usuario.rol.nombre == 'ENTRENADOR'} ? 'bg-warning text-dark' : 'bg-info')" th:text="${usuario.rol.nombre}"></span></td>
                            <td><span class="badge" th:classappend="${usuario.enabled} ? 'bg-success' : 'bg-secondary'" th:text="${usuario.enabled} ? 'Activo' : 'Inactivo'"></span></td>
                            <td class="text-center">
                                <a th:href="@{/admin/usuarios/{id}/editar(id=${usuario.id})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i> Editar Rol</a>
                                <form th:action="@{/admin/usuarios/{id}/eliminar(id=${usuario.id})}" method="post" class="d-inline" onsubmit="return confirm('¿Eliminar usuario?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i> Eliminar</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(usuarios)}"><td colspan="6" class="text-center text-muted py-4">No hay usuarios registrados</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
