<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Roles - Icesi Fit')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-shield-lock me-2"></i>Gestión de Roles</h2>
        <div>
            <a th:href="@{/admin/roles/nuevo}" class="btn btn-success me-2"><i class="bi bi-plus-lg me-1"></i>Crear Rol</a>
            <a th:href="@{/admin}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Dashboard</a>
        </div>
    </div>
    <div class="row g-4">
        <div th:each="rol : ${roles}" class="col-md-6 col-lg-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title fw-bold"><i class="bi bi-shield-check me-1 text-success"></i><span th:text="${rol.nombre}"></span></h5>
                    <p class="card-text text-muted small" th:text="${rol.descripcion ?: 'Sin descripción'}"></p>
                    <h6 class="mt-3 mb-2 fw-semibold">Permisos:</h6>
                    <div class="d-flex flex-wrap gap-1">
                        <span th:each="permiso : ${rol.permisos}" class="badge bg-light text-dark border" th:text="${permiso.nombre}"></span>
                        <span th:if="${#lists.isEmpty(rol.permisos)}" class="text-muted small">Sin permisos</span>
                    </div>
                </div>
                <div class="card-footer bg-white border-0 d-flex gap-2 pb-3">
                    <a th:href="@{/admin/roles/{id}/permisos(id=${rol.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-key me-1"></i>Editar Permisos</a>
                    <form th:action="@{/admin/roles/{id}/eliminar(id=${rol.id})}" method="post" class="d-inline" onsubmit="return confirm('¿Eliminar rol?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash me-1"></i>Eliminar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
