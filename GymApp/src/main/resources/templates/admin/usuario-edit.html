<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Editar Usuario - Icesi Fit')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>
<div class="container">
    <div class="row justify-content-center"><div class="col-md-6">
        <div class="card shadow-sm"><div class="card-body p-4">
            <h3 class="fw-bold mb-4"><i class="bi bi-person-gear me-2"></i>Cambiar Rol de Usuario</h3>
            <div class="mb-4 p-3 bg-light rounded">
                <p class="mb-1"><strong>Nombre:</strong> <span th:text="${usuario.nombre}"></span></p>
                <p class="mb-1"><strong>Correo:</strong> <span th:text="${usuario.correoInstitucional}"></span></p>
                <p class="mb-0"><strong>Rol actual:</strong> <span class="badge bg-secondary" th:text="${usuario.rol.nombre}"></span></p>
            </div>
            <form th:action="@{/admin/usuarios/{id}/rol(id=${usuario.id})}" method="post">
                <div class="mb-4">
                    <label class="form-label fw-semibold">Nuevo Rol</label>
                    <select name="rolId" class="form-select" required>
                        <option th:each="rol : ${roles}" th:value="${rol.id}" th:text="${rol.nombre + ' - ' + rol.descripcion}" th:selected="${rol.id == usuario.rol.id}">Rol</option>
                    </select>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Guardar Cambio</button>
                    <a th:href="@{/admin/usuarios}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div></div>
    </div></div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
