<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Permisos del Rol - Icesi Fit')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>
<div class="container">
    <div class="row justify-content-center"><div class="col-md-7">
        <div class="card shadow-sm"><div class="card-body p-4">
            <h3 class="fw-bold mb-4"><i class="bi bi-key me-2"></i>Permisos del Rol: <span class="text-primary" th:text="${rol.nombre}"></span></h3>
            <div class="mb-3 p-3 bg-light rounded">
                <p class="mb-0"><strong>Descripción:</strong> <span th:text="${rol.descripcion ?: 'Sin descripción'}"></span></p>
            </div>
            <form th:action="@{/admin/roles/{id}/permisos(id=${rol.id})}" method="post">
                <div class="mb-4">
                    <label class="form-label fw-semibold">Permisos asignados <span class="text-danger">*</span></label>
                    <p class="text-muted small mb-2">Marca los permisos que deseas asignar a este rol</p>
                    <div class="row">
                        <div th:each="permiso : ${todosPermisos}" class="col-md-6 mb-2">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="permisosIds" th:value="${permiso.id}" th:id="'permiso-' + ${permiso.id}" th:checked="${#lists.contains(rol.permisos.![id], permiso.id)}"/>
                                <label class="form-check-label" th:for="'permiso-' + ${permiso.id}">
                                    <strong th:text="${permiso.nombre}"></strong><br/>
                                    <small class="text-muted" th:text="${permiso.descripcion}"></small>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Guardar Permisos</button>
                    <a th:href="@{/admin/roles}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div></div>
    </div></div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
