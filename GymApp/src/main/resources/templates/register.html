<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Registro - Icesi Fit')}"></head>
<body class="d-flex align-items-center" style="min-height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus text-success" style="font-size: 3rem;"></i>
                        <h2 class="fw-bold mt-2">Crear Cuenta</h2>
                        <p class="text-muted">Únete a Icesi Fit</p>
                    </div>
                    <div th:if="${error}" class="alert alert-danger py-2">
                        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}"></span>
                    </div>
                    <form th:action="@{/register}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre completo</label>
                            <div class="input-group"><span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" name="nombre" class="form-control" placeholder="Tu nombre completo" required/></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Correo institucional</label>
                            <div class="input-group"><span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" name="correo" class="form-control" placeholder="usuario@icesi.edu.co" required/></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Contraseña</label>
                            <div class="input-group"><span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" name="password" class="form-control" placeholder="Mínimo 4 caracteres" required minlength="4"/></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Rol</label>
                            <select name="rolId" class="form-select" required>
                                <option value="">Selecciona un rol</option>
                                <option th:each="rol : ${roles}" th:value="${rol.id}" th:text="${rol.nombre}">Rol</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-semibold py-2"><i class="bi bi-check-lg me-1"></i>Registrarse</button>
                    </form>
                    <hr class="my-4"/>
                    <p class="text-center mb-0">¿Ya tienes cuenta? <a th:href="@{/login}" class="fw-semibold text-decoration-none">Inicia sesión</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
